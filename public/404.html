<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect all paths to index.html for SPA routing on GitHub Pages
      const path = window.location.pathname.replace('/data-marketplace-hub', '');
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(
        '/data-marketplace-hub/?p=' + encodeURIComponent(path + search) + hash
      );
    </script>
  </head>
  <body></body>
</html>
